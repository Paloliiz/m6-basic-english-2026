<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Unit 1: Mastery Mission</title>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;600;700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; font-family: 'Anuphan', sans-serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; color: #1e293b; }
        .workbook-card { width: 600px; background: #f8fafc; border-radius: 20px; padding: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); border: 4px solid #334155; text-align: center; }
        h1 { font-family: 'Montserrat', sans-serif; color: #1e293b; margin-bottom: 5px; }
        .subtitle { color: #64748b; margin-bottom: 30px; font-weight: 600; }
        input { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; margin-bottom: 20px; box-sizing: border-box; }
        button { background: #3b82f6; color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #2563eb; }
        #status { margin-top: 15px; color: #dc2626; font-size: 14px; }
    </style>
</head>
<body>

<div class="workbook-card" id="login-screen">
    <div style="background: #3b82f6; color:white; padding: 5px 15px; border-radius: 20px; display:inline-block; font-size: 12px; margin-bottom: 10px;">NEW FRONTIERS 6 (M.6)</div>
    <h1>Mastery Mission</h1>
    <p class="subtitle">Unit 1: Getting Ready for College</p>
    <input type="text" id="idInput" placeholder="รหัสนักเรียน (5 หลัก)">
    <button onclick="checkData()">เริ่มภารกิจ <i class="fa-solid fa-arrow-right"></i></button>
    <div id="status"></div>
</div>

<script>
    // URL ที่ครูได้มา
    const APP_URL = "https://script.google.com/macros/s/AKfycby0c2A_cyEX04WpbLduvDCZQQdVVz7dYIDoOpV02EeG99cpTp2jwyb0v3SGu4AWO4A9hQ/exec";

    async function checkData() {
        const btn = document.querySelector('button');
        const status = document.getElementById('status');
        btn.textContent = "กำลังโหลดข้อมูล...";
        btn.disabled = true;

        try {
            const response = await fetch(APP_URL);
            if (!response.ok) throw new Error("ไม่สามารถเชื่อมต่อฐานข้อมูลได้");
            
            const data = await response.json();
            console.log("Data loaded:", data);
            alert("โหลดภารกิจสำเร็จ! พร้อมลุยครับ");
            // ตรงนี้ถ้าสำเร็จ เราจะเปลี่ยนหน้าไปหน้า Quiz ต่อครับ
        } catch (err) {
            status.textContent = "ข้อผิดพลาด: " + err.message + " (ลองเช็ค Deployment อีกรอบนะครับ)";
            btn.textContent = "เริ่มภารกิจ";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
